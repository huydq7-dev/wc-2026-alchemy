<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#d4a830"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Gold ring -->
  <circle cx="256" cy="220" r="150" fill="none" stroke="url(#gold)" stroke-width="8" opacity="0.8"/>

  <!-- Soccer ball body (white hexagon/pentagon pattern) -->
  <circle cx="256" cy="220" r="110" fill="white"/>

  <!-- Pentagon center -->
  <polygon points="256,170 288,192 276,228 236,228 224,192" fill="#1a1f3a"/>

  <!-- Pentagon patches around -->
  <polygon points="256,298 278,284 278,256 256,244 234,256 234,284" fill="#1a1f3a"/>
  <polygon points="166,258 182,236 206,248 206,272 182,284" fill="#1a1f3a"/>
  <polygon points="346,258 330,236 306,248 306,272 330,284" fill="#1a1f3a"/>
  <polygon points="178,188 196,166 220,174 226,196 212,220" fill="#1a1f3a"/>
  <polygon points="334,188 316,166 292,174 286,196 300,220" fill="#1a1f3a"/>

  <!-- Stitching lines -->
  <line x1="256" y1="170" x2="224" y2="192" stroke="#1a1f3a" stroke-width="2"/>
  <line x1="256" y1="170" x2="288" y2="192" stroke="#1a1f3a" stroke-width="2"/>
  <line x1="224" y1="192" x2="236" y2="228" stroke="#1a1f3a" stroke-width="2"/>
  <line x1="288" y1="192" x2="276" y2="228" stroke="#1a1f3a" stroke-width="2"/>

  <!-- Year text -->
  <text x="256" y="400" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="56" fill="url(#gold)" letter-spacing="8">2026</text>

  <!-- Trophy silhouette (simplified) -->
  <text x="256" y="448" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#64748b" letter-spacing="12">PREDICTOR</text>
</svg>